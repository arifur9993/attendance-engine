name: release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

# Version-only mode: this workflow opens / updates the "chore: version packages" PR.
# Publishing to npm is done manually from a local terminal:
#   cd packages/core && npm publish --access public
# (Browser-based OTP works locally; CI couldn't bypass 2FA reliably for the org scope.)
# To re-enable CI publish later, add a `publish: pnpm changeset publish` input to the step below
# and ensure NPM_TOKEN is a granular token with Read+Write on @attendance-engine and Bypass 2FA.

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - name: Create version PR
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
